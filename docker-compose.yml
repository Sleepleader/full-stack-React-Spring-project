# ==================== Smart Mall Docker Compose ====================
# 启动命令：docker-compose up -d
# 停止命令：docker-compose down

version: '3.8'

services:

  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: smart-mall-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_mall
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./back-end/smart-mall/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - smart-mall-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Nacos 2.3 （单机模式） ====================
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: smart-mall-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - smart-mall-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==================== Redis（暂未启用，预留配置） ====================
  # 取消注释即可启用 Redis
  # redis:
  #   image: redis:7-alpine
  #   container_name: smart-mall-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - smart-mall-net

  # ==================== 前端（React + Nginx） ====================
  frontend:
    build:
      context: ./front-end/my-react-app
      dockerfile: Dockerfile
    container_name: smart-mall-frontend
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - smart-mall-net

  # ==================== 网关服务 ====================
  gateway:
    build:
      context: ./back-end/smart-mall
      dockerfile: mall-gateway/Dockerfile
    container_name: smart-mall-gateway
    ports:
      - "9527:9527"
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - smart-mall-net

  # ==================== 认证服务 ====================
  auth-service:
    build:
      context: ./back-end/smart-mall/mall-auth-service
      dockerfile: Dockerfile
    container_name: smart-mall-auth
    ports:
      - "8080:8080"
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - smart-mall-net

  # ==================== 用户服务 ====================
  user-service:
    build:
      context: ./back-end/smart-mall/mall-user-service
      dockerfile: Dockerfile
    container_name: smart-mall-user
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - smart-mall-net

networks:
  smart-mall-net:
    driver: bridge

volumes:
  mysql-data:
  # redis-data:   # Redis 启用后取消注释
